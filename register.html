<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - AuraShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Sticky Header -->
  <header></header>

  <!-- Register Form Section -->
  <section class="section">
    <div class="container">
      
      <div class="auth-wrapper">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Register to unlock cart synchronization and coupon tracking</p>
        
        <form id="register-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
          </div>
          
          <div class="form-group">
            <label for="password">Password (min 6 characters)</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 15px; padding: 12px 20px;">
            Create Account
          </button>
        </form>

        <div class="auth-footer">
          Already registered? <a href="login.html">Login Here</a>
        </div>
      </div>

    </div>
  </section>

  <!-- Clean Footer -->
  <footer></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
