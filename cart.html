<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - aurashop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Sticky Header -->
  <header></header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Shopping Cart</h1>
      <div class="breadcrumbs">
        <a href="index.html">Home</a> &nbsp;/&nbsp; <span>Shopping Cart</span>
      </div>
    </div>
  </section>

  <!-- Cart Content Section -->
  <section class="section">
    <div class="container">

      <div class="cart-layout" id="cart-container-layout">
        <!-- Rendered dynamically -->
        <div class="spinner-wrapper" style="grid-column: 1/-1;">
          <div class="spinner"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- Clean Footer -->
  <footer></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>

  <script>
    let activeCoupon = '';

    document.addEventListener('DOMContentLoaded', () => {
      renderCartView();
    });

    document.addEventListener('cartUpdated', () => {
      renderCartView();
    });

    function renderCartView() {
      const layout = document.getElementById('cart-container-layout');
      const cart = Cart.getCart();

      if (cart.length === 0) {
        layout.style.display = 'block';
        layout.innerHTML = `
          <div class="flex-center" style="flex-direction: column; padding: 80px 0; background-color: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border);">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 25px;"></i>
            <h2>Your Cart is Empty</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Add some curated products to start styling.</p>
            <a href="products.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Return to Shop</a>
          </div>
        `;
        return;
      }

      // Restore layout grid
      layout.style.display = 'grid';

      // Totals calculation
      const totals = Cart.getTotals(activeCoupon);

      // Render Left panel: Cart items list
      let itemsHtml = `
        <div class="cart-table-card">
          <h3 style="margin-bottom: 20px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Cart Selections</h3>
      `;

      itemsHtml += cart.map(item => {
        const discountedPrice = (item.price * (1 - item.discount / 100)).toFixed(2);
        return `
          <div class="cart-item">
            <div class="cart-item-info">
              <img src="${item.image_url}" alt="${item.name}" class="cart-item-img">
              <div class="cart-item-details">
                <h4>${item.name}</h4>
                <p>Original Price: ₹${parseFloat(item.price).toFixed(2)}</p>
                ${item.discount > 0 ? `<p style="color: var(--danger); font-weight:600;">Discount: -${Math.round(item.discount)}%</p>` : ''}
              </div>
            </div>
            <div class="flex-center" style="gap: 20px;">
              <div class="qty-input" style="height: 36px;">
                <button onclick="Cart.updateQuantity(${item.id}, ${item.quantity - 1})" style="width:30px; height: 100%;">-</button>
                <input type="number" value="${item.quantity}" style="width: 35px;" readonly>
                <button onclick="Cart.updateQuantity(${item.id}, ${item.quantity + 1})" style="width:30px; height: 100%;">+</button>
              </div>
              <div style="font-weight: 700; width: 80px; text-align: right;">₹${(discountedPrice * item.quantity).toFixed(2)}</div>
              <button onclick="Cart.removeFromCart(${item.id})" class="btn-icon" style="border:none; color: var(--danger); background: transparent;" title="Remove Item">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');

      itemsHtml += `
          <div style="margin-top: 20px; display: flex; justify-content: space-between;">
            <a href="products.html" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
            <button onclick="Cart.clearCart()" class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger);"><i class="fas fa-trash"></i> Empty Cart</button>
          </div>
        </div>
      `;

      // Render Right panel: Summary
      const summaryHtml = `
        <div class="cart-summary-card">
          <h3 style="margin-bottom: 20px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Order Summary</h3>
          
          <div class="summary-row">
            <span>Subtotal</span>
            <span>₹${totals.subtotal.toFixed(2)}</span>
          </div>
          <div class="summary-row" style="color: var(--danger);">
            <span>Discounts</span>
            <span>-₹${totals.discount.toFixed(2)}</span>
          </div>
          ${totals.couponDiscount > 0 ? `
            <div class="summary-row" style="color: var(--success); font-weight: 600;">
              <span>Promo Code (10%)</span>
              <span>-₹${totals.couponDiscount.toFixed(2)}</span>
            </div>
          ` : ''}
          <div class="summary-row">
            <span>Shipping</span>
            <span style="color: var(--success); font-weight: 600;">Free</span>
          </div>
          
          <!-- Coupon input -->
          <div style="display: flex; gap: 10px; margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px;">
            <input type="text" id="coupon-input" class="form-control" placeholder="Promo Code" value="${activeCoupon}" style="padding: 8px 12px; height: 38px;">
            <button onclick="submitCoupon()" class="btn btn-secondary btn-sm" style="height: 38px;">Apply</button>
          </div>
          
          <div class="summary-row total">
            <span>Total</span>
            <span style="color: var(--primary); font-size: 1.5rem;">₹${totals.total.toFixed(2)}</span>
          </div>

          <!-- Checkout Address Form -->
          <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h4 style="margin-bottom: 12px; font-weight: 600;">Delivery Address</h4>
            <div class="form-group" style="margin-bottom: 15px;">
              <textarea id="shipping-address" class="form-control" rows="3" placeholder="Full shipping address details..." required></textarea>
            </div>
          </div>

          <button id="checkout-btn" onclick="processCheckout()" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 15px; padding: 12px 20px;">
            <i class="fas fa-credit-card"></i> Proceed to Checkout
          </button>
        </div>
      `;

      layout.innerHTML = itemsHtml + summaryHtml;
    }

    function submitCoupon() {
      const code = document.getElementById('coupon-input').value.trim();
      if (!code) {
        activeCoupon = '';
        renderCartView();
        return;
      }
      if (code.toUpperCase() === 'SAVE10') {
        activeCoupon = 'SAVE10';
        showToast('Promo code applied successfully!', 'success');
      } else {
        showToast('Invalid promo code', 'error');
        activeCoupon = '';
      }
      renderCartView();
    }

    async function processCheckout() {
      const address = document.getElementById('shipping-address').value.trim();
      if (!address) {
        showToast('Please enter your shipping address details', 'warning');
        return;
      }

      if (!Auth.isLoggedIn()) {
        showToast('Please log in to complete your checkout', 'warning');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        return;
      }

      const totals = Cart.getTotals(activeCoupon);

      // Render and append simulated payment gateway modal
      const payModal = document.createElement('div');
      payModal.id = 'payment-modal-overlay';
      payModal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background-color: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center; z-index: 999999;
        opacity: 0; transition: opacity 0.3s ease;
      `;
      payModal.innerHTML = `
        <div style="background-color: var(--bg-card); padding: 30px; border-radius: var(--radius-lg); width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: var(--shadow-lg);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3 style="font-weight: 800;">Simulated Secure Pay</h3>
            <button onclick="closePaymentModal()" style="font-size: 1.2rem; color: var(--text-muted);"><i class="fas fa-times"></i></button>
          </div>

          <!-- 3D Flippable Credit Card -->
          <div class="credit-card-wrap" id="card-flipper">
            <div class="credit-card-inner">
              <div class="credit-card-front">
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:1.2rem;">
                  <i class="fas fa-sim-card"></i>
                  <i class="fab fa-cc-visa"></i>
                </div>
                <div id="card-num-display" style="font-size: 1.35rem; font-weight: 700; letter-spacing: 2px; margin: 20px 0;">•••• •••• •••• ••••</div>
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; text-transform:uppercase;">
                  <div>
                    <div style="color: rgba(255,255,255,0.7); font-size:0.6rem;">Cardholder</div>
                    <div id="card-name-display" style="font-weight: 600;">Your Name</div>
                  </div>
                  <div>
                    <div style="color: rgba(255,255,255,0.7); font-size:0.6rem;">Expires</div>
                    <div id="card-expiry-display" style="font-weight: 600;">MM/YY</div>
                  </div>
                </div>
              </div>
              <div class="credit-card-back">
                <div style="width: 100%; height: 35px; background-color: #000; margin-top: 15px;"></div>
                <div style="padding: 15px 24px;">
                  <div style="background-color: #fff; color: #000; padding: 6px; text-align: right; font-family: monospace; border-radius: 4px; font-size: 0.9rem;">
                    <span style="color: #ccc; letter-spacing: 3px;">xxxx</span> <strong id="card-cvv-display">•••</strong>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Payment Input Fields -->
          <form onsubmit="handleSimulatedPayment(event, '${address}')">
            <div class="form-group" style="margin-bottom: 12px;">
              <label style="font-size:0.75rem;">Card Number</label>
              <input type="text" id="pay-number" class="form-control" placeholder="4111 1111 1111 1111" maxlength="19" required style="padding:8px 12px; font-size:0.9rem;">
            </div>
            <div class="form-group" style="margin-bottom: 12px;">
              <label style="font-size:0.75rem;">Cardholder Name</label>
              <input type="text" id="pay-name" class="form-control" placeholder="John Doe" required style="padding:8px 12px; font-size:0.9rem;">
            </div>
            <div style="display:flex; gap: 15px; margin-bottom: 20px;">
              <div class="form-group" style="flex:1; margin-bottom: 0;">
                <label style="font-size:0.75rem;">Expiry Date</label>
                <input type="text" id="pay-expiry" class="form-control" placeholder="MM/YY" maxlength="5" required style="padding:8px 12px; font-size:0.9rem;">
              </div>
              <div class="form-group" style="flex:1; margin-bottom: 0;">
                <label style="font-size:0.75rem;">CVV</label>
                <input type="password" id="pay-cvv" class="form-control" placeholder="123" maxlength="3" required style="padding:8px 12px; font-size:0.9rem;">
              </div>
            </div>
            <button type="submit" id="pay-submit-btn" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">
              <i class="fas fa-lock"></i> Authorize & Pay ₹${totals.total.toFixed(2)}
            </button>
          </form>
        </div>
      `;

      // Append styles if not present
      if (!document.getElementById('card-flip-styles')) {
        const style = document.createElement('style');
        style.id = 'card-flip-styles';
        style.innerHTML = `
          .credit-card-wrap { perspective: 1000px; width: 100%; height: 175px; margin-bottom: 20px; }
          .credit-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
          .credit-card-wrap.flipped .credit-card-inner { transform: rotateY(180deg); }
          .credit-card-front, .credit-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius-md); padding: 20px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-md); }
          .credit-card-front { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
          .credit-card-back { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); transform: rotateY(180deg); padding: 0; }
        `;
        document.head.appendChild(style);
      }

      document.body.appendChild(payModal);
      setTimeout(() => { payModal.style.opacity = '1'; }, 50);

      // Setup credit card input event listeners
      const numInput = document.getElementById('pay-number');
      const nameInput = document.getElementById('pay-name');
      const expiryInput = document.getElementById('pay-expiry');
      const cvvInput = document.getElementById('pay-cvv');
      const flipper = document.getElementById('card-flipper');

      numInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let formatted = '';
        for (let i = 0; i < val.length; i++) {
          if (i > 0 && i % 4 === 0) formatted += ' ';
          formatted += val[i];
        }
        e.target.value = formatted;
        document.getElementById('card-num-display').textContent = formatted || '•••• •••• •••• ••••';
      });

      nameInput.addEventListener('input', (e) => {
        document.getElementById('card-name-display').textContent = e.target.value.toUpperCase() || 'YOUR NAME';
      });

      expiryInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        if (val.length >= 2) {
          val = val.slice(0, 2) + '/' + val.slice(2, 4);
        }
        e.target.value = val;
        document.getElementById('card-expiry-display').textContent = val || 'MM/YY';
      });

      cvvInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        e.target.value = val;
        document.getElementById('card-cvv-display').textContent = val || '•••';
      });

      // Flip card on CVV focus
      cvvInput.addEventListener('focus', () => { flipper.classList.add('flipped'); });
      cvvInput.addEventListener('blur', () => { flipper.classList.remove('flipped'); });
    }

    function closePaymentModal() {
      const modal = document.getElementById('payment-modal-overlay');
      if (modal) {
        modal.style.opacity = '0';
        setTimeout(() => { modal.remove(); }, 300);
      }
    }

    async function handleSimulatedPayment(e, address) {
      e.preventDefault();
      const submitBtn = document.getElementById('pay-submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Authorization...';

      // Simulate bank authorization processing (1.5s)
      setTimeout(async () => {
        closePaymentModal();
        
        // Trigger checkout
        const checkoutBtn = document.getElementById('checkout-btn');
        checkoutBtn.disabled = true;
        checkoutBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Placing Order...';
        await Cart.checkout(address, activeCoupon);
        checkoutBtn.disabled = false;
        checkoutBtn.innerHTML = '<i class="fas fa-credit-card"></i> Proceed to Checkout';
      }, 1500);
    }
  </script>
</body>

</html>
